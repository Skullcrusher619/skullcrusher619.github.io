<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Personal Streamer Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Sidebar Navigation -->
<nav class="sidebar" id="sidebar">
  <button class="toggle" id="sidebarToggle">☰</button>
  <h2>Menu</h2>
  <div class="nav-links">
    <a href="#" onclick="scrollToSection('hero')">🏠 Home</a>
    <a href="#" onclick="focusSearch()">🔍 Search</a>
    <a href="#" onclick="scrollToSection('continueSection')">▶️ Continue Watching</a>
    <a href="#" onclick="scrollToSection('favoritesSection')">⭐ Favorites</a>
    <a href="#" onclick="scrollToSection('recentSection')">🕒 Recently Watched</a>
  </div>
</nav>

<div class="main-wrapper">
  <!-- Top Bar with Search -->
  <header class="top-bar">
    <div class="search-container">
      <input type="text" id="titleInput" placeholder="Search movies, series..." autocomplete="off">
      <button id="searchBtn">Search</button>
      <div id="autocomplete"></div>
    </div>
  </header>

  <main class="main-content">
    
    <!-- Hero Billboard -->
    <section class="hero-section" id="hero">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-content">
        <div class="hero-text">
          <h1 id="heroTitle">Loading...</h1>
          <div class="hero-meta" id="heroMeta"></div>
          <p id="heroPlot" class="hero-plot"></p>
          <div class="hero-actions">
            <button id="heroPlayBtn" class="btn primary-btn">▶ Play</button>
            <button id="heroMoreBtn" class="btn secondary-btn">ℹ More Info</button>
          </div>
        </div>
        <img id="heroPoster" src="" alt="" class="hero-poster">
      </div>
    </section>

    <!-- Content Rows (Carousels) -->
    <div class="rows-container">
      
      <section class="content-row" id="searchSection" style="display: none;">
        <div class="row-header">
          <h2>Search Results</h2>
          <div class="filters">
            <select id="filterType">
              <option value="all">All</option>
              <option value="movie">Movies</option>
              <option value="series">Series</option>
            </select>
          </div>
        </div>
        <div class="carousel-wrapper">
          <button class="scroll-btn left" onclick="scrollCarousel('searchCarousel', -1)">‹</button>
          <div class="carousel" id="searchCarousel"></div>
          <button class="scroll-btn right" onclick="scrollCarousel('searchCarousel', 1)">›</button>
        </div>
      </section>

      <section class="content-row" id="continueSection">
        <h2>Continue Watching</h2>
        <div class="carousel-wrapper">
          <button class="scroll-btn left" onclick="scrollCarousel('continueCarousel', -1)">‹</button>
          <div class="carousel" id="continueCarousel"></div>
          <button class="scroll-btn right" onclick="scrollCarousel('continueCarousel', 1)">›</button>
        </div>
      </section>

      <section class="content-row" id="favoritesSection">
        <h2>Your Favorites</h2>
        <div class="carousel-wrapper">
          <button class="scroll-btn left" onclick="scrollCarousel('favoritesCarousel', -1)">‹</button>
          <div class="carousel" id="favoritesCarousel"></div>
          <button class="scroll-btn right" onclick="scrollCarousel('favoritesCarousel', 1)">›</button>
        </div>
      </section>

      <section class="content-row" id="recentSection">
        <h2>Recently Watched</h2>
        <div class="carousel-wrapper">
          <button class="scroll-btn left" onclick="scrollCarousel('recentCarousel', -1)">‹</button>
          <div class="carousel" id="recentCarousel"></div>
          <button class="scroll-btn right" onclick="scrollCarousel('recentCarousel', 1)">›</button>
        </div>
      </section>

    </div>
  </main>
</div>

<!-- Details Modal -->
<div id="detailsModal" class="modal-overlay" style="display:none;">
  <div class="modal-content glass-panel">
    <button class="close-btn" onclick="closeModal('detailsModal')">✕</button>
    <div class="modal-body" id="modalDetailsBody">
      <!-- Injected via JS -->
    </div>
  </div>
</div>

<!-- Player Modal -->
<div id="playerModal" class="modal-overlay player-overlay" style="display:none;">
  <div class="player-wrapper">
    <button class="close-btn" onclick="closePlayer()">✕</button>
    <div id="playerContainer" class="video-container"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
